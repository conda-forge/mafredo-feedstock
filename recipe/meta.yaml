{% set name = "mafredo" %}
{% set version = "2025.3.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  # url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  url: https://files.pythonhosted.org/packages/f2/34/054a2c9010fe4068b4b7fca8a59313ff7b844bb192ac39bb503da0206c8a/mafredo-{{ version }}.tar.gz # hard-copied
  sha256: 16c93baf897316a0e53f15ace6c9a3d8c19625c54f753bfd57c9f1fdc8bef84e

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python >=3.5
    - pyscaffold
    - setuptools
  run:
    - python >=3.5
    - xarray
    - scipy
    - numpy
    - pyyaml
    - matplotlib

test:
  imports:
    - mafredo

about:
  home: https://github.com/RubendeBruin/mafredo
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  summary: "Marine Frequency Domain"
  doc_url: https://mafredo.readthedocs.io/en/latest/
  dev_url: https://github.com/RubendeBruin/mafredo

extra:
  recipe-maintainers:
    - rubendebruin
