{% set name = "mafredo" %}
{% set version = "2025.4.1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  # url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  url: https://files.pythonhosted.org/packages/9e/b6/1db7f04965b5d3bf7756297ad552ea66ff4cfd96e75a6bb9e78245455363/mafredo-{{ version }}.tar.gz # hard-copied
  sha256: 370c1c66bbe839d007c21c48404e4f105f2f4a06192136809bd2e6dc2905e6d5

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python >=3.5
    - pyscaffold
    - setuptools
  run:
    - python >=3.5
    - xarray
    - scipy
    - numpy
    - pyyaml
    - matplotlib

test:
  imports:
    - mafredo

about:
  home: https://github.com/RubendeBruin/mafredo
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  summary: "Marine Frequency Domain"
  doc_url: https://mafredo.readthedocs.io/en/latest/
  dev_url: https://github.com/RubendeBruin/mafredo

extra:
  recipe-maintainers:
    - rubendebruin
